<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAW Logo Preview</title>
    <style>
        body {
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        svg {
            max-width: 300px;
            height: auto;
        }
        h1 {
            color: #2D3436;
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        p {
            color: #636e72;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Embedded SVG -->
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="#e84393" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Left side of the heart -->
                <path d="M 50,85 C 20,65 5,45 5,25 A 15,15 0 0 1 35,25 C 38,25 45,28 50,35" />
                <!-- Right side -->
                <path d="M 50,85 C 80,65 95,45 95,25 C 95,15 85,15 80,20" />
                <!-- Toes -->
                <circle cx="45" cy="12" r="4.5" />
                <circle cx="65" cy="8" r="4.5" />
                <circle cx="85" cy="14" r="4.5" />
            </g>
            <text x="50" y="98" font-family="Arial" font-size="7" text-anchor="middle" fill="#2D3436" font-weight="bold" letter-spacing="2">PAW</text>
        </svg>
        <h1>Logo Entwurf</h1>
        <p>Halb Herz, halb Pfote. Minimalistisch & Zeitlos.</p>
    </div>
</body>
</html>
