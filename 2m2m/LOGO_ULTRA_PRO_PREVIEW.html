<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAW Ultra-Pro - Architectural Identity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body {
            background-color: #F8FAFC;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .canvas {
            background: white;
            padding: 100px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #E2E8F0;
        }
        svg {
            width: 380px;
            height: auto;
        }
        .meta {
            margin-top: 50px;
            color: #94A3B8;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .badge {
            background: #1E293B;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 9px;
            margin-bottom: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="badge">Ultra-Pro Edition v2.0</div>
        <!-- Ultra Pro SVG Integration -->
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(0, 5)">
                <g fill="none" stroke="#1E293B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Base: Unified without crossing -->
                    <path d="M 100,160 C 40,140 20,110 20,70 20,40 50,30 75,45 C 88,52 95,65 100,80" />
                    <path d="M 100,160 C 160,140 180,110 180,70 180,40 150,30 125,45 C 112,52 105,65 100,80" />
                    
                    <!-- Crown: Architectural Negative Space -->
                    <path d="M 35,45 A 10,10 0 0 1 50,25" />
                    <path d="M 75,25 A 12,12 0 0 1 95,15" />
                    <path d="M 105,15 A 12,12 0 0 1 125,25" />
                    <path d="M 150,25 A 10,10 0 0 1 165,45" />
                </g>
            </g>
            <text x="100" y="192" font-family="Inter" font-size="24" text-anchor="middle" fill="#1E293B" font-weight="900" letter-spacing="10">PAW</text>
        </svg>
        <div class="meta">Precision Geometrics & No-Overlap Architecture</div>
    </div>
</body>
</html>
