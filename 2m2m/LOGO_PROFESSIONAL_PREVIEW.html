<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAW High-End Branding Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap');
        body {
            background-color: #0F172A;
            color: #F8FAFC;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .canvas {
            background: radial-gradient(circle at center, #1E293B 0%, #0F172A 100%);
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        svg {
            width: 400px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(74, 144, 226, 0.2));
        }
        .tagline {
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            color: #94A3B8;
            font-weight: 400;
        }
        .brand-guide {
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }
        .swatch {
            height: 40px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .label { font-size: 10px; margin-top: 5px; color: #64748B; }
    </style>
</head>
<body>
    <div class="canvas">
        <!-- Professional SVG Integration -->
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
                </linearGradient>
            </defs>
            <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Balanced Heart Pad -->
                <path d="M 100,160 C 45,130 20,100 20,65 20,40 45,25 70,40 C 85,50 95,65 100,80 C 105,65 115,50 130,40 155,25 180,40 180,65 180,100 155,130 100,160" stroke="url(#brandGradient)" />
                <!-- Modern Minimalist Toes -->
                <circle cx="55" cy="25" r="8" stroke="#F8FAFC" stroke-width="4" opacity="0.6" />
                <circle cx="100" cy="15" r="10" stroke="#F8FAFC" stroke-width="4" />
                <circle cx="145" cy="25" r="8" stroke="#F8FAFC" stroke-width="4" opacity="0.6" />
            </g>
            <text x="100" y="195" font-family="Inter" font-size="24" text-anchor="middle" fill="#F8FAFC" font-weight="800" letter-spacing="8">PAW</text>
        </svg>
        <div class="tagline">The Digital Trust Anchor for Animal Health</div>
        
        <div class="brand-guide">
            <div><div class="swatch" style="background: #38BDF8;"></div><div class="label">Primary Blue</div></div>
            <div><div class="swatch" style="background: #34D399;"></div><div class="label">Success Green</div></div>
            <div><div class="swatch" style="background: #0F172A;"></div><div class="label">Deep Slate</div></div>
        </div>
    </div>
</body>
</html>
