<svg width="800" height="800" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    PAW Professional Corporate Identity
    Geometric Harmony & Technical Precision
    Color: Slate Blue #2D3E50 (Trust, Stability, Tech)
  -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67B26F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g fill="none" stroke="#2D3E50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- 
      The "Heart-Base" (Main Pad)
      Mathematically balanced curves 
    -->
    <path d="M 100,165 
             C 40,135 15,100 15,65 
             15,35 45,20 70,35
             C 85,45 95,60 100,75
             C 105,60 115,45 130,35
             70,20 185,35 185,65
             185,100 160,135 100,165" 
          stroke="url(#brandGradient)" />

    <!-- 
      The "Toes" (Integrated Geometry)
      Four precisely placed ellipses forming the paw crown 
      and completing the heart's upper silhouette.
    -->
    <path d="M 45,35 A 12,12 0 1 1 65,15" stroke-width="5" opacity="0.8" />
    <path d="M 75,15 A 15,15 0 1 1 125,15" stroke-width="5" />
    <path d="M 135,15 A 12,12 0 1 1 155,35" stroke-width="5" opacity="0.8" />
    
    <!-- 
      Refined Connection Point 
      Subtle break for modern "Stencil" look 
    -->
    <line x1="100" y1="75" x2="100" y2="100" stroke-dasharray="10 10" stroke-width="2" opacity="0.3" />
  </g>

  <!-- Typography: Modern Sans-Serif -->
  <text x="100" y="195" font-family="Inter, system-ui, sans-serif" font-size="22" text-anchor="middle" fill="#2D3E50" font-weight="800" letter-spacing="6">PAW</text>
  <text x="100" y="210" font-family="Inter, sans-serif" font-size="8" text-anchor="middle" fill="#95A5A6" font-weight="400" letter-spacing="2">DIGITAL HEALTH INFRASTRUCTURE</text>
</svg>
