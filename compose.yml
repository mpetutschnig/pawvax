version: '3.8'

services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: paw-postgres
    environment:
      - POSTGRES_DB=pawvax
      - POSTGRES_USER=pawvax
      - POSTGRES_PASSWORD=${DB_PASSWORD:-change-me-in-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawvax"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  paw-server:
    build:
      context: .
      dockerfile: Containerfile.server
    container_name: paw-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - DATABASE_URL=postgresql://pawvax:${DB_PASSWORD:-change-me-in-production}@postgres:5432/pawvax
      - UPLOADS_DIR=/data/uploads
      - NODE_ENV=production
    volumes:
      - paw-uploads:/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    expose:
      - "3000"

  paw-web:
    build:
      context: .
      dockerfile: Containerfile.pwa
    container_name: paw-web
    ports:
      - "80:80"
    depends_on:
      paw-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  paw-uploads:
    driver: local
